<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="assets/css/dashboard_users.css" />
    <title>Users Management - Dashboard</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
  </head>
  <body>
    <div class="menu">
      <ul>
        <li class="profile">
          <div class="img-box">
            <img
              src="Image/cheerful_man_with_hands_crossed_transparent_background_g_1_3_1.jpg"
              alt="image profile"
            />
          </div>
          <h2>Ahmed kaoud</h2>
        </li>
        <hr />
        <li>
          <a href="dashboard.html">
            <i class="fas fa-home"></i>
            <p>dashboard</p>
          </a>
        </li>
        <li>
          <a class="active" href="dashboard_users.html">
            <i class="fas fa-user-group"></i>
            <p>clients</p>
          </a>
        </li>
        <li>
          <a href="#">
            <i class="fas fa-table"></i>
            <p>products</p>
          </a>
        </li>
        <li>
          <a href="#">
            <i class="fas fa-chart-pie"></i>
            <p>charts</p>
          </a>
        </li>
        <li>
          <a href="#">
            <i class="fas fa-pen"></i>
            <p>posts</p>
          </a>
        </li>
        <li>
          <a href="#">
            <i class="fas fa-star"></i>
            <p>favorite</p>
          </a>
        </li>
        <li>
          <a href="#">
            <i class="fas fa-cog"></i>
            <p>settings</p>
          </a>
        </li>
        <li class="log-out">
          <a href="#">
            <i class="fas fa-sign-out"></i>
            <p>log out</p>
          </a>
        </li>
      </ul>
    </div>
    <div class="content">
      <div class="title-info">
        <p>Users Management</p>
        <i class="fas fa-user-group"></i>
      </div>

      <!-- User Form Section (Only visible for owner) -->
      <div class="user-form-container" id="userFormContainer">
        <h3 id="formTitle">Create New User</h3>
        <form id="userForm">
          <div class="form-grid">
            <div class="form-group">
              <label for="userName">Name</label>
              <input type="text" id="userName" name="name" required />
            </div>
            <div class="form-group">
              <label for="userEmail">Email</label>
              <input type="email" id="userEmail" name="email" required />
            </div>
            <div class="form-group">
              <label for="userPassword">Password</label>
              <input
                type="password"
                id="userPassword"
                name="password"
                required
                minlength="6"
              />
            </div>
            <div class="form-group">
              <label for="userRole">Role</label>
              <select id="userRole" name="role" required>
                <option value="user">User</option>
                <option value="admin">Admin</option>
                <option value="owner">Owner</option>
              </select>
            </div>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="submitBtn">
              <i class="fas fa-user-plus"></i> Create User
            </button>
            <button
              type="button"
              class="btn btn-secondary"
              id="cancelBtn"
              style="display: none"
            >
              <i class="fas fa-times"></i> Cancel
            </button>
          </div>
        </form>
      </div>

      <!-- Users Table Section -->
      <div class="title-info">
        <p>All Users</p>
        <i class="fas fa-users"></i>
      </div>

      <div class="table-container">
        <table id="usersTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Name</th>
              <th>Email</th>
              <th>Role</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="usersTableBody">
            <tr>
              <td colspan="5" class="loading-cell">
                <i class="fas fa-spinner fa-spin"></i> Loading users...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Authentication Script -->
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/dashboard/dashboard.js"></script>
    <script src="assets/js/dashboard_users.js"></script>
  </body>
</html>
